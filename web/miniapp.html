<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Finder Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    
    <style>
        /* Web UI Parity CSS */
        *{box-sizing:border-box;margin:0;padding:0}:root{--bg:#141414;--bg2:#000;--bg3:#2b2b2b;--bg4:#333;--accent:#e50914;--text:#fff;--muted:#808080;--border:#404040;--card:#181818}
        .light{--bg:#f3f3f3;--bg2:#fff;--bg3:#e6e6e6;--bg4:#ccc;--text:#141414;--muted:#666;--border:#ccc;--card:#fff}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.2s, color 0.2s; padding-bottom: 20px;}
        
        /* Header & Theme */
        .topbar{background:var(--bg2);padding:15px 4%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); gap:10px; flex-wrap:wrap;}
        .logo{font-size:18px;font-weight:900;letter-spacing:1px;color:var(--accent);display:flex;align-items:center;gap:8px; white-space:nowrap;}
        .nf-icon{background:var(--accent);color:#fff;padding:2px 7px;border-radius:3px;font-size:18px;line-height:1}
        .controls-row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
        .theme-btn, .settings-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--text);cursor:pointer;transition:0.2s; outline:none;}
        .theme-btn:hover, .settings-btn:hover{background:var(--bg3)}

        /* Search & Filters */
        .search-zone{padding:15px 4%;background:var(--bg)}
        .search-row{display:flex;gap:10px; margin-bottom:15px;}
        .search-input{width:100%;flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 15px;color:var(--text);font-size:15px;outline:0}
        .search-input:focus{border-color:var(--accent)}
        .search-btn{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:0 20px;font-weight:700;cursor:pointer; font-size:15px;}

        .filters{display:flex;gap:8px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn{background:var(--card);border:1px solid var(--border);padding:8px 16px;font-weight:700;color:var(--muted);cursor:pointer;border-radius:20px; font-size: 13px; transition:0.2s;}
        .filter-btn.active{background:var(--text);color:var(--bg); border-color:var(--text);}
        
        /* Grid Layout */
        .main{padding:0 4%; max-width:1400px; margin:0 auto}
        .res-grid{display:grid;grid-template-columns:1fr;gap:15px;}
        
        @media(min-width: 600px) { .res-grid{grid-template-columns:repeat(2, 1fr);} }
        @media(min-width: 900px) { .res-grid{grid-template-columns:repeat(3, 1fr);} }

        .file-card{display:flex;flex-direction:column;background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden;position:relative;}
        
        /* Landscape Aspect Ratio (16:9) */
        .poster-box{width:100%;position:relative;background:var(--bg3); padding-top: 56.252%;} 
        .mode-none .poster-box{display:none}
        .fc-poster{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
        
        .badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.8); font-size: 10px; font-weight: 900; padding: 3px 6px; border-radius: 4px; border: 1px solid; z-index: 2; }
        .badge.primary { color: var(--accent); border-color: var(--accent); }
        .badge.cloud { color: #3399ff; border-color: #3399ff; }
        .badge.archive { color: #aaaaaa; border-color: #aaaaaa; }

        .fc-content{padding:12px;display:flex;flex-direction:column;flex:1}
        .fc-name{font-size:15px;font-weight:700;margin-bottom:5px;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;}
        .fc-meta{font-size:12px;color:var(--muted);margin-bottom:12px;font-weight:500;}
        
        .fc-actions{margin-top:auto;display:flex;gap:5px;flex-direction:column;}
        .btn-row{display:flex;gap:5px;width:100%;}
        .btn{flex:1;text-align:center;padding:10px 0;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
        .btn-play{background:var(--text);color:var(--bg);}
        .btn-dl{background:var(--bg);color:var(--text);border:1px solid var(--border);}
        .btn-edit{background:#444;color:#fff;width:100%;margin-top:2px;}

        /* States */
        .empty, .error-state{text-align:center;padding:50px 20px;color:var(--muted);grid-column:1/-1;font-weight:500;}
        .error-state .error-icon{font-size:40px;margin-bottom:15px}
        .error-state .error-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}
        .error-state .error-msg{font-size:13px;}
        
        .pagination{display:none;justify-content:space-between;padding:30px 0;align-items:center}
        .pg-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer}
        .pg-btn:disabled{opacity:0.5;cursor:not-allowed;}
        
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent);color:#fff;padding:12px 24px;border-radius:30px;font-weight:700;font-size:13px;transition:0.3s;z-index:1000;white-space:nowrap;box-shadow:0 4px 10px rgba(0,0,0,0.5);}
        .toast.show{transform:translateX(-50%) translateY(0)}

        /* 👑 EDIT MODAL STYLING (YouTube Studio Mode Parity) */
        .edit-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;overflow-y:auto;padding:20px 10px}.edit-modal.open{opacity:1;pointer-events:all}.em-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:25px;width:100%;max-width:450px;box-shadow:0 10px 30px rgba(0,0,0,.5);position:relative;margin:auto}.em-close{position:absolute;top:15px;right:20px;background:0 0;border:0;color:var(--muted);font-size:24px;cursor:pointer;z-index:10}.em-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}.em-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}.em-input{width:100%;background:var(--bg);border:1px solid var(--border);padding:12px;color:var(--text);margin-bottom:15px;border-radius:6px;outline:none;font-size:14px}.em-input:focus{border-color:var(--accent)}.thumb-preview-box{width:100%;aspect-ratio:16/9;background:var(--bg3);border:1px solid var(--border);border-radius:6px;margin-bottom:15px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}.t-prev-img{max-width:100%;max-height:100%;object-fit:contain}.em-upload-btn{display:block;text-align:center;background:var(--bg4);border:1px dashed var(--border);padding:12px;border-radius:6px;cursor:pointer;font-weight:700;font-size:13px;margin-bottom:20px;transition:0.2s}.em-upload-btn:hover{background:var(--bg3);border-color:var(--text)}.em-save-btn{width:100%;background:var(--accent);color:#fff;border:0;padding:14px;font-weight:700;border-radius:6px;cursor:pointer;font-size:15px;transition:0.2s}.em-save-btn:hover{background:#b30710}.em-save-btn:disabled{opacity:.5;cursor:not-allowed}.cropper-container-box{width:100%;aspect-ratio:16/9;margin-bottom:15px;border-radius:6px;overflow:hidden;display:none;background:#000}.cropper-view-box{box-outline:none;outline:2px solid var(--accent)!important;outline-color:var(--accent)!important}.cropper-line,.cropper-point{background-color:var(--accent)!important;opacity:0.8}.cropper-bg{background-image:none!important;background-color:#000!important}.cropper-modal{opacity:.8!important;background-color:#000!important}

        /* 🎬 IN-APP VIDEO PLAYER OVERLAY MODAL */
        .player-modal{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.3s;justify-content:center;}.player-modal.open{opacity:1;pointer-events:all;}
        .player-header{position:absolute;top:15px;left:0;width:100%;padding:0 20px;display:flex;justify-content:space-between;align-items:center;z-index:310;background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);pointer-events:none;}
        .player-title{font-size:15px;font-weight:700;color:#fff;word-break:break-all;padding-right:40px;pointer-events:auto;}
        .player-close{background:rgba(255,255,255,0.1);border:0;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:auto;outline:none;}
        .video-wrapper{width:100%;max-height:100vh;}
        /* Plyr Accent Color Alignment */
        .plyr--video{--plyr-color-main: var(--accent);}
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo"><span class="nf-icon">F</span> FAST FINDER</div>
        <div class="controls-row">
            <select id="posterMode" class="settings-btn" onchange="changePosterMode()">
                <option value="tg">📸 TG Thumb</option>
                <option value="none">⚡ Fast (Text)</option>
            </select>
            <button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
        </div>
    </div>

    <div class="search-zone">
        <div class="search-row">
            <input type="text" id="q" class="search-input" placeholder="Search movies, series..." enterkeyhint="search">
            <button class="search-btn" onclick="doSearch(0)">Go</button>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-col="all" onclick="setCol(this)">All Sources</button>
            <button class="filter-btn" data-col="primary" onclick="setCol(this)">Primary</button>
            <button class="filter-btn" data-col="cloud" onclick="setCol(this)">Cloud</button>
            <button class="filter-btn" data-col="archive" onclick="setCol(this)">Archive</button>
        </div>
    </div>

    <div class="main">
        <div class="res-grid" id="results">
            <div class="empty">Type a movie name above to start searching.</div>
        </div>

        <div class="pagination" id="pageBox"><button class="pg-btn" id="pBtn" onclick="prev()">◀ Prev</button><span style="font-size:13px; font-weight:700;" id="pgInfo">Page 1</span><button class="pg-btn" id="nBtn" onclick="next()">Next ▶</button></div>
    </div>

    <div class="edit-modal" id="editCombinedModal" onclick="if(event.target===this)closeCombinedModal()">
        <div class="em-card">
            <button class="em-close" onclick="closeCombinedModal()">&#10005;</button>
            <div class="em-title">✏️ Edit Title Metadata</div>
            
            <div class="em-label">File Name</div>
            <input type="text" id="emName" class="em-input">
            
            <div class="em-label">Poster Thumbnail (YouTube Studio Mode)</div>
            <div class="thumb-preview-box" id="emPreviewBox"></div>
            <div class="cropper-container-box" id="cropContainer"></div>
            
            <label class="em-upload-btn">
                📂 Choose New Image / Poster
                <input type="file" id="emFile" accept="image/*" style="display:none;" onchange="handleLocalPreview(this)">
            </label>
            
            <button class="em-save-btn" id="emSaveBtn" onclick="saveAllChanges()">Save Changes</button>
        </div>
    </div>

    <div class="player-modal" id="playerModal">
        <div class="player-header">
            <div class="player-title" id="pVideoTitle">Streaming Movie...</div>
            <button class="player-close" onclick="closeInlinePlayer()">&#10005;</button>
        </div>
        <div class="video-wrapper">
            <video id="inlinePlayer" playsinline controls></video>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    
    <script>
        // Telegram WebApp Config
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        if(localStorage.getItem('miniapp_theme') === 'light') {
            document.documentElement.classList.add('light');
        }
        function toggleTheme() {
            let isLight = document.documentElement.classList.toggle('light');
            localStorage.setItem('miniapp_theme', isLight ? 'light' : 'dark');
        }

        let curQ = '', curOff = 0, nextOff = '', curCol = 'all', curPage = 1;
        let activeFid = '', activeCol = '', cropperInstance = null, plyrInstance = null;
        
        let pMode = localStorage.getItem('miniapp_posterMode') || 'tg';
        document.getElementById('posterMode').value = pMode;

        const INIT_DATA = tg.initData || '';

        // प्लीयर इनिशियलाइज़ करें
        document.addEventListener('DOMContentLoaded', () => {
            plyrInstance = new Plyr('#inlinePlayer', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'fullscreen'],
                settings: ['speed'],
                speed: { selected: 1, options: [0.75, 1, 1.25, 1.5, 2] }
            });
        });

        function changePosterMode() {
            pMode = document.getElementById('posterMode').value;
            localStorage.setItem('miniapp_posterMode', pMode);
            let resGrid = document.getElementById('results');
            if(pMode === 'none') resGrid.classList.add('mode-none');
            else resGrid.classList.remove('mode-none');
            if (curQ) doSearch(curOff);
        }

        function setCol(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            curCol = btn.dataset.col;
            if (curQ) doSearch(0);
        }

        function showToast(msg) {
            let t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.getElementById('q').addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch(0);
        });

        function handleThumbError(fileId) {
            const box = document.getElementById(`poster-box-${fileId}`);
            if (box) {
                box.innerHTML = `
                    <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1f1f1f; gap:6px; padding:10px;">
                        <span style="font-size:11px; color:var(--muted); text-align:center;">थंबनेल लोड नहीं हुआ (Busy)</span>
                        <button onclick="reloadThumb('${fileId}')" id="btn-rl-${fileId}" style="background:var(--accent); color:#fff; border:none; padding:5px 10px; border-radius:4px; font-size:11px; font-weight:bold; cursor:pointer;">🔄 Retry</button>
                    </div>`;
            }
        }

        async function reloadThumb(fileId) {
            const btn = document.getElementById(`btn-rl-${fileId}`);
            if (btn) { btn.innerText = "Loading..."; btn.disabled = true; }
            const timestamp = new Date().getTime();
            const box = document.getElementById(`poster-box-${fileId}`);
            if (box) {
                box.innerHTML = `<img src="/api/thumb?file_id=${fileId}&retry=true&t=${timestamp}" class="fc-poster" onerror="handleThumbError('${fileId}')">`;
            }
        }

        function showError(type, extra = '') {
            const grid = document.getElementById('results');
            if (type === 'auth') {
                grid.innerHTML = `<div class="error-state"><div class="error-icon">🔒</div><div class="error-title">Access Required</div><div class="error-msg">Premium membership needed.<br>Use /plan command in the bot.</div></div>`;
            } else if (type === 'rate') {
                grid.innerHTML = `<div class="error-state"><div class="error-icon">⏳</div><div class="error-title">Searching too fast!</div><div class="error-msg">Please wait a moment and try again.</div></div>`;
            } else if (type === 'init') {
                grid.innerHTML = `<div class="error-state"><div class="error-icon">⚠️</div><div class="error-title">Open via Telegram Bot</div><div class="error-msg">This app securely works only inside Telegram.</div></div>`;
            } else {
                grid.innerHTML = `<div class="error-state"><div class="error-icon">❌</div><div class="error-title">Something went wrong</div><div class="error-msg">${extra || 'Please try again.'}</div></div>`;
            }
        }

        async function doSearch(offset) {
            let q = document.getElementById('q').value.trim();
            if (!q) return showToast("Enter a movie name!");
            if (!INIT_DATA) { showError('init'); return; }

            curQ = q; curOff = offset; if (offset === 0) curPage = 1;
            document.getElementById('results').innerHTML = '<div class="empty">Searching...</div>';
            document.getElementById('pageBox').style.display = 'none';

            try {
                let res = await fetch(
                    `/api/search?q=${encodeURIComponent(q)}&offset=${offset}&col=${curCol}&mode=${pMode}`,
                    { headers: { 'X-Telegram-Init-Data': INIT_DATA } }
                );

                if (res.status === 403) { showError('auth'); return; }
                if (res.status === 429) { showError('rate'); return; }
                if (!res.ok) { showError('generic', `Server error (${res.status})`); return; }

                let d = await res.json();
                if (d.error) {
                    if (d.error.includes('Unauthorized')) { showError('auth'); return; }
                    if (d.error.includes('fast')) { showError('rate'); return; }
                    showError('generic', d.error); return;
                }

                if (!d.results || d.results.length === 0) {
                    document.getElementById('results').innerHTML = `<div class="empty">No results found for "${q}"</div>`; return;
                }

                let html = '';
                d.results.forEach(f => {
                    let sc = (f.source || 'primary').toLowerCase();
                    let badgeClass = ['primary', 'cloud', 'archive'].includes(sc) ? sc : 'primary';

                    let adminControls = '';
                    if (d.is_admin) {
                        adminControls = `<button class="btn btn-edit" onclick="editFile('${f.file_id}','${f.raw_collection}','${f.name.replace(/'/g, "\\\\'")}')">✏️ Edit Metadata</button>`;
                    }

                    let imgHtml = '';
                    if (pMode !== 'none') {
                        imgHtml = `<div class="poster-box" id="poster-box-${f.file_id}"><img src="${f.tg_thumb}" class="fc-poster" onerror="handleThumbError('${f.file_id}')" loading="lazy"></div>`;
                    }

                    html += `
                    <div class="file-card">
                        <span class="badge ${badgeClass}">${sc.toUpperCase()}</span>
                        ${imgHtml}
                        <div class="fc-content">
                            <div class="fc-name">${f.name}</div>
                            <div class="fc-meta">${f.size} • ${f.type}</div>
                            <div class="fc-actions">
                                <div class="btn-row">
                                    <button class="btn btn-play" onclick="openInlinePlayer('${f.file_id}', '${f.name.replace(/'/g, "\\\\'")}')">▶ Play</button>
                                    <button class="btn btn-dl" onclick="triggerDownload('${f.file_id}')">⬇ DL</button>
                                </div>
                                ${adminControls}
                            </div>
                        </div>
                    </div>`;
                });

                document.getElementById('results').innerHTML = html;
                nextOff = d.next_offset;

                document.getElementById('pageBox').style.display = 'flex';
                document.getElementById('pBtn').disabled = (offset === 0);
                document.getElementById('nBtn').disabled = !nextOff;
                document.getElementById('pgInfo').innerText = 'Page ' + curPage;

                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                console.error(err);
                showError('generic', 'Network error.');
            }
        }

        // 🎬 IN-APP VIDEO STREAMING ENGINE
        async function openInlinePlayer(fileId, videoName) {
            showToast('▶ Preparing inline stream player...');
            try {
                let res = await fetch('/setup_stream', {
                    method: 'POST',
                    headers: { 'X-Telegram-Init-Data': INIT_DATA, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_id: fileId, mode: 'watch' })
                });

                if (res.status === 403) { return showToast('🔒 Access denied'); }
                if (!res.ok) { return showToast('❌ Server busy'); }

                let data = await res.json().catch(() => ({}));
                if (data.url) {
                    // वीडियो का टाइटल और स्ट्रीमिंग सोर्स यूआरएल असाइन करें
                    document.getElementById('pVideoTitle').innerText = videoName;
                    
                    let streamUrl = window.location.origin + data.url;
                    plyrInstance.source = {
                        type: 'video',
                        title: videoName,
                        sources: [{ src: streamUrl, type: 'video/mp4' }]
                    };
                    
                    // मोडल खोलें और ऑटो-प्ले करें
                    document.getElementById('playerModal').classList.add('open');
                    plyrInstance.play();
                } else {
                    showToast('❌ Stream link not provided by backend');
                }
            } catch (err) {
                console.error(err);
                showToast('❌ Video initialization failed');
            }
        }

        function closeInlinePlayer() {
            plyrInstance.pause();
            document.getElementById('playerModal').classList.remove('open');
        }

        // ⬇ DOWNLOADING ROUTING
        async function triggerDownload(fileId) {
            showToast('⬇ Preparing direct download link...');
            try {
                let res = await fetch('/setup_stream', {
                    method: 'POST',
                    headers: { 'X-Telegram-Init-Data': INIT_DATA, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_id: fileId, mode: 'download' })
                });
                let data = await res.json().catch(() => ({}));
                if (data.url) tg.openLink(window.location.origin + data.url);
                else tg.openLink(`${window.location.origin}/setup_stream?file_id=${fileId}&mode=download`);
            } catch (e) {
                tg.openLink(`${window.location.origin}/setup_stream?file_id=${fileId}&mode=download`);
            }
        }

        // 👑 एडमिन कम्बाइंड मोडल मैनेजमेंट (YouTube Studio Mode)
        function editFile(fid, col, currentName) {
            activeFid = fid; activeCol = col;
            if(cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
            document.getElementById('emName').value = currentName;
            document.getElementById('emFile').value = '';
            document.getElementById('cropContainer').style.display = 'none';
            var prevBox = document.getElementById('emPreviewBox');
            prevBox.style.display = 'flex';
            prevBox.innerHTML = '<img src="/api/thumb?file_id=' + fid + '" class="t-prev-img" onerror="this.src=\\'https://placehold.co/600x338/181818/FFF?text=No+Thumbnail\\';">';
            document.getElementById('editCombinedModal').classList.add('open');
        }

        function closeCombinedModal() {
            document.getElementById('editCombinedModal').classList.remove('open');
            if(cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
        }

        function handleLocalPreview(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    if(cropperInstance) { cropperInstance.destroy(); }
                    document.getElementById('emPreviewBox').style.display = 'none';
                    var cropWrap = document.getElementById('cropContainer');
                    cropWrap.style.display = 'block';
                    cropWrap.innerHTML = '<img id="cropImage" src="' + e.target.result + '" style="max-width:100%;">';
                    
                    var imageElement = document.getElementById('cropImage');
                    cropperInstance = new Cropper(imageElement, {
                        aspectRatio: 16 / 9,
                        viewMode: 1,
                        dragMode: 'move',
                        background: false,
                        autoCropArea: 1,
                        restore: false,
                        guides: false,
                        center: true,
                        highlight: false,
                        cropBoxMovable: false,
                        cropBoxResizable: false,
                        toggleDragModeOnDblclick: false,
                        zoomable: true,
                        movable: true
                    });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveAllChanges() {
            var newName = document.getElementById('emName').value.trim();
            if(!newName) return showToast('File name cannot be empty!');
            var btn = document.getElementById('emSaveBtn');
            btn.disabled = true; btn.innerText = "Processing pipeline...";
            try {
                if (cropperInstance) {
                    showToast('✂️ Cropping & Uploading to Telegram...');
                    var canvas = cropperInstance.getCroppedCanvas({ width: 1280, height: 720, imageSmoothingEnabled: true, imageSmoothingQuality: 'high' });
                    var blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
                    if (blob) {
                        var formData = new FormData();
                        formData.append('file_id', activeFid);
                        formData.append('collection', activeCol);
                        formData.append('image', blob, 'cropped_poster.jpg');
                        var upRes = await fetch('/api/upload_thumb', { method: 'POST', headers: { 'X-Telegram-Init-Data': INIT_DATA }, body: formData });
                        var upData = await upRes.json();
                        if (!upData.success) { showToast(upData.error || 'Telegram image sync failed!'); btn.disabled = false; btn.innerText = "Save Changes"; return; }
                    }
                }
                showToast('💾 Indexing metadata to Database...');
                var r = await fetch('/api/edit_name', { method: 'POST', headers: { 'X-Telegram-Init-Data': INIT_DATA, 'Content-Type': 'application/json' }, body: JSON.stringify({ file_id: activeFid, collection: activeCol, new_name: newName }) });
                var res = await r.json();
                if(res.success) { showToast('✨ Metadata & Studio Poster saved!'); closeCombinedModal(); doSearch(curOff); } 
                else { showToast(res.error || 'Metadata save failed!'); }
            } catch(e) { showToast('Network error'); }
            finally { btn.disabled = false; btn.innerText = "Save Changes"; }
        }

        if(pMode === 'none') document.getElementById('results').classList.add('mode-none');
        function next() { if (nextOff) { curPage++; doSearch(nextOff); } }
        function prev() { if (curPage > 1) { curPage--; doSearch(Math.max(0, curOff - 21)); } }
    </script>
</body>
</html>
